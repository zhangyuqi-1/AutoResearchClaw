project:
  name: "my-research"
  mode: "full-auto"

research:
  topic: "Your research topic here"
  domains:
    - "machine-learning"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/New_York"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

# ============================================================================
# LLM Provider Configuration
# ============================================================================
# Supported providers:
#   - "openai"           → OpenAI API (default base_url)
#   - "openrouter"       → OpenRouter (access to 200+ models via single API)
#   - "deepseek"         → DeepSeek API
#   - "openai-compatible" → Any OpenAI-compatible API (requires base_url)
#   - "acp"              → ACP agent protocol (for local agents)
#
# OpenRouter Example (https://openrouter.ai):
#   Get your API key at https://openrouter.ai/keys
#   Models: anthropic/claude-3.5-sonnet, google/gemini-pro-1.5, meta-llama/llama-3.1-70b-instruct
#   See all models: https://openrouter.ai/models
# ============================================================================
llm:
  # Provider options: "openai", "openrouter", "deepseek", "openai-compatible", "acp"
  provider: "openai"
  
  # base_url is auto-set for known providers (openai, openrouter, deepseek)
  # Only needed for "openai-compatible" provider
  base_url: "https://api.openai.com/v1"
  
  # API key from environment variable (recommended) or direct value
  api_key_env: "OPENAI_API_KEY"
  api_key: ""
  
  primary_model: "gpt-4o"
  fallback_models:
    - "gpt-4.1"
    - "gpt-4o-mini"
  
  # Semantic Scholar API key (optional, for literature search)
  s2_api_key: ""
  notes: ""

# ============================================================================
# Example: OpenRouter Configuration
# ============================================================================
# llm:
#   provider: "openrouter"
#   api_key_env: "OPENROUTER_API_KEY"
#   primary_model: "anthropic/claude-3.5-sonnet"
#   fallback_models:
#     - "google/gemini-pro-1.5"
#     - "meta-llama/llama-3.1-70b-instruct"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "sandbox"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
  docker:
    image: "researchclaw/experiment:latest"
    gpu_enabled: true
    memory_limit_mb: 8192
    network_policy: "none"
    auto_install_deps: true
    shm_size_mb: 2048
    keep_containers: false
  ssh_remote:
    host: ""                # SSH hostname or IP
    user: ""                # SSH username (default: current user)
    port: 22                # SSH port
    key_path: ""            # Path to private key (default: ~/.ssh/id_rsa)
    gpu_ids: []             # e.g. [0, 1] for CUDA_VISIBLE_DEVICES
    remote_workdir: "/tmp/researchclaw_experiments"
    remote_python: "python3"
    setup_commands: []      # e.g. ["source ~/venv/bin/activate", "pip install torch"]
    # Docker-over-SSH (most secure remote execution)
    use_docker: false       # Set true to run experiments inside Docker on remote host
    docker_image: "researchclaw/experiment:latest"
    docker_network_policy: "none"   # none | full
    docker_memory_limit_mb: 8192
    docker_shm_size_mb: 2048

# ============================================================================
# SSH Remote Examples
# ============================================================================
#
# 1. Lab server (bare Python, basic sandboxing):
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "gpu-server.lab.edu"
#       user: "researcher"
#       key_path: "~/.ssh/id_rsa"
#       gpu_ids: [0]
#       remote_python: "python3"
#
# 2. Lab server (Docker — most secure):
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "gpu-server.lab.edu"
#       user: "researcher"
#       key_path: "~/.ssh/id_rsa"
#       gpu_ids: [0]
#       use_docker: true
#       docker_image: "researchclaw/experiment:latest"
#       docker_network_policy: "none"
#
# 3. Colab via SSH tunnel:
#   experiment:
#     mode: "ssh_remote"
#     ssh_remote:
#       host: "localhost"
#       port: 12345
#       user: "root"
#       remote_python: "python3"
#       setup_commands:
#         - "pip install torch torchvision -q"
#
# 4. Colab via Google Drive (most robust, no SSH needed):
#   experiment:
#     mode: "colab_drive"
#     colab_drive:
#       drive_root: "~/Library/CloudStorage/GoogleDrive-you@gmail.com/My Drive/researchclaw"
#       poll_interval_sec: 30
#       timeout_sec: 3600
#       setup_script: "pip install torch torchvision -q"
#   # Then in Colab: run the colab_worker.py that appears in your Drive

  colab_drive:
    drive_root: ""          # Local path to Google Drive mount
    poll_interval_sec: 30   # How often to check for results
    timeout_sec: 3600       # Max wait per experiment (1 hour)
    setup_script: ""        # Shell commands to run before each experiment

prompts:
  custom_file: ""
