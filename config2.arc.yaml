# === 项目 ===
project:
  name: "my-research"              # 项目标识符
  mode: "full-auto"               # docs-first | semi-auto | full-auto

# === 研究 ===
research:
  topic: "LLM-GNN fusion for cross-project software vulnerability detection based on multimodal code representation learning"                     # 研究主题（必填）
  paper_title: "LLM-GNN Fusion: Cross-Project Software Vulnerability Detection via Multimodal Code Representation Learning"               # 论文标题（轻量约束；为空则由模型生成）
  domains: [ "software vulnerability detection", "software engineering", "graph neural networks", "large language models", "multimodal code representation learning", "cross-project learning" ]           # 文献搜索的研究领域
  daily_paper_count: 10             # 每个搜索查询的目标论文数
  quality_threshold: 4.0           # 论文最低质量分

# === 运行时 ===
runtime:
  timezone: "Asia/Shanghai"        # 用于时间戳
  max_parallel_tasks: 3            # 并发实验限制
  approval_timeout_hours: 12       # 门控阶段超时
  retry_limit: 2                   # 阶段失败重试次数

# === LLM ===
llm:
  provider: "acp"
  base_url: ""
  wire_api: "chat_completions"
  api_key_env: ""
  # api_key: ""
  primary_model: "codex"
  fallback_models: [ ]
  acp:
    agent: "codex"
    cwd: "."
    session_name: "researchclaw"
    timeout_sec: 1800

# === 实验 ===
experiment:
  mode: "sandbox"                  # simulated | sandbox | docker | ssh_remote  simulated模式就是编造数据不实际跑的意思
  time_budget_sec: 3600             # 每次运行最大执行时间（默认：300 秒）
  max_iterations: 100               # 最大优化迭代次数
  metric_key: "f1"                 # 主指标名称
  metric_direction: "maximize"     # minimize | maximize
  sandbox:
    python_path: ".venv/bin/python"
    gpu_required: true
    max_memory_mb: 10240
  opencode: # OpenCode Beast Mode（通过 `researchclaw setup` 自动安装）
    enabled: true                    # 主开关（默认：true）
    auto: true                       # 无需确认自动触发（默认：true）
    complexity_threshold: 0.2        # 0.0-1.0 — 越高 = 仅在复杂实验时触发
    model: "gpt-5.4"  # 使用本机 opencode 已配置的模型登录态
    timeout_sec: 1800                 # OpenCode 生成最大秒数
    max_retries: 3                   # 失败重试次数
    workspace_cleanup: true          # 采集后清理临时工作区
  code_agent: # CodeAgent v2 — 多阶段代码生成
    enabled: true                    # 使用 CodeAgent 替代传统单 prompt 代码生成
    architecture_planning: true      # 生成代码前先生成深度实现蓝图
    sequential_generation: true      # 按依赖 DAG 逐文件生成
    hard_validation: true            # 基于 AST 的验证门控（拦截相同消融、硬编码指标）
    hard_validation_max_repairs: 2   # 验证失败时最大修复次数
    exec_fix_max_iterations: 3       # 执行修复循环最大次数
    exec_fix_timeout_sec: 60         # 每次执行修复超时（秒）
  benchmark_agent: # BenchmarkAgent — 自动数据集和基线选择
    enabled: false                    # 启用 4-agent 基准测试流水线（Surveyor→Selector→Acquirer→Validator）
    enable_hf_search: true           # 搜索 HuggingFace Datasets
    enable_web_search: true          # 搜索 Google Scholar 获取基准
    tier_limit: 2                    # 数据集级别过滤（1=小型/已缓存，2=中型，3=大型）
    min_benchmarks: 1                # 最少需要的数据集数量
    min_baselines: 2                 # 最少需要的基线方法数量
  figure_agent: # FigureAgent — 学术图表生成
    enabled: true                    # 启用 5-agent 图表流水线（Planner→CodeGen→Renderer→Critic→Integrator）
    min_figures: 6                    # 最少生成图表数
    max_figures: 6                    # 最多生成图表数
    max_iterations: 3                # Critic 驱动的迭代优化次数
    dpi: 500                         # 输出分辨率
    strict_mode: true               # 图表生成失败时是否阻塞流水线
    output_format: "python"

    # Nano Banana (Gemini native image generation)
    nano_banana_enabled: true
    gemini_api_key: ""  # or set GEMINI_API_KEY env var
    gemini_model: "gemini-3.1-flash-image-preview"

  repair: # 反数据捏造实验修复
    enabled: true                    # 自动诊断并修复失败的实验
    max_cycles: 5                    # 修复重试循环数
    min_completion_rate: 0.5         # >=50% 条件必须完成才可继续
    min_conditions: 2                # 有效实验至少需要 2 个条件
    use_opencode: true               # 通过 OpenCode Beast Mode 进行修复
  editorial_repair:
    enabled: true
    provider: "codex_cli"
    mode: "publish_first"
    timeout_sec: 900
    max_iterations: 5
    workspace_cleanup: true

# === 网络搜索（可选）===
web_search:
  enabled: true                      # 启用网络增强文献搜索
  tavily_api_key_env: "TAVILY_API_KEY"  # Tavily API key 环境变量（可选）
  enable_scholar: true               # Google Scholar 搜索
  enable_pdf_extraction: true        # 从 PDF 中提取文本
  enable_crawling: false # 关闭浏览器抓取, 有代理会出问题
  max_web_results: 10                # 每次查询最大网络结果数

# === 导出 ===
export:
  target_conference: "neurips_2025"  # neurips_2025 | iclr_2026 | icml_2026
  authors: "Anonymous"
  bib_file: "references"

# === 通知 ===
notifications:
  channel: "console"  # console | slack | email | none

# === 知识库 ===
knowledge_base:
  root: "knowledge_base"  # 知识库文件存储目录
